name: Security Scan
on:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run Security Scan
        run: npm run security:scan || echo "Security scan script not found, skipping"
        continue-on-error: true
      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-scan-results.json
        continue-on-error: true

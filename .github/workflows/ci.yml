name: CI

on:
  pull_request:
    branches: [main, staging, dev]
  push:
    branches: [main, staging, dev]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

  lint:
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'
          cache: 'npm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Skip build - Vercel is the source of truth
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "BUILD VALIDATION DELEGATED TO VERCEL"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "GitHub Actions CI does not perform Next.js builds."
          echo "Vercel preview deployments serve as the authoritative build"
          echo "validation environment with full production parity."
          echo ""
          echo "Rationale:"
          echo "- Vercel has complete production environment configuration"
          echo "- Vercel has all required secrets and environment variables"
          echo "- Vercel preview URLs provide immediate build verification"
          echo "- GitHub Actions lacks Vault-based runtime architecture"
          echo ""
          echo "✅ Build validation: Check Vercel deployment status"
          echo "══════════════════════════════════════════════════════════════"

  security:
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for security vulnerabilities
        run: |
          if npm audit --audit-level=high; then
            echo "✅ No high/critical vulnerabilities found"
          else
            echo "⚠️  Security vulnerabilities detected - review required"
            exit 0
          fi
